<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste Segregation Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Waste Segregation Assistant</h1>

        <p>Enter a waste item to identify its category.</p>

        <input type="text" id="wasteInput" placeholder="Example: Banana Peel">

        <button onclick="checkWaste()">Check Waste Type</button>

        <div class="result" id="resultBox"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
